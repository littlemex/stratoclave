# Machine-readable coverage for the small-team workshop scenario.
# Aggregated into scenarios/COVERAGE.md by backend/tests/test_scenarios_coverage.py.
# States: covered | covered-elsewhere | not-implemented | user-responsibility
# Rules enforced in CI: not-implemented needs an `issue:`; a step with
# measures:true must not be not-implemented / user-responsibility.
id: usage-small-team
title: A small team on one shared budget pool
audience: user

steps:
  - id: cost-savings
    axis: cost
    capability: savings-certificate
    state: covered
    measures: true
    note: >
      Real Savings Certificate engine folds the team's VSR-acted traffic into a
      counterfactual net saving (escalation subtracted, potential kept separate,
      quality.measured=false). Runs offline today.

  - id: cost-gateway-charge-of-record
    axis: cost
    capability: gateway-charge-of-record
    state: covered
    measures: true
    evidence: {mode: live-gateway, date: "2026-07-22", region: us-east-1, n: 10, run_id: gw1}
    note: >
      THE gateway-path number: /v1/messages ran auth -> reserve -> real Bedrock ->
      settle -> ledger, and the CHARGE-OF-RECORD the gateway settled was read back
      from the ledger ($0.000492 over 10 reqs, vs $0.000562 client-side estimate).
      transport=in-process-asgi, ledger=moto (real DynamoDB behaviour not exercised).

  - id: cost-baseline-billing
    axis: cost
    capability: real-token-pricing
    state: covered
    measures: true
    evidence: {mode: live, date: "2026-07-22", region: us-east-1, n: 30, run_id: demo1}
    note: >
      baseline_direct.py prices REAL Bedrock token usage (message_delta, not
      estimated) with the shipped pricer — the DIRECT-path measuring stick
      ($0.001686 over 30 calls). Gateway NOT in path; verifies the pricer, not
      Stratoclave. Diffed against the gateway charge-of-record above.

  - id: cost-per-user-attribution
    axis: cost
    capability: per-user-cost-split
    state: user-responsibility
    measures: false
    note: >
      Splitting the shared-pool spend per team member for chargeback is the
      operator's accounting choice; the ledger records span_id + tenant, the
      per-user rollup policy is theirs to define.

  - id: perf-ttft-gateway-path
    axis: perf
    capability: gateway-path-token-timing
    state: covered
    measures: true
    evidence: {mode: live-gateway, date: "2026-07-22", region: us-east-1, n: 10, run_id: gw1}
    note: >
      TTFT/TPOT measured on the GATEWAY path (/v1/messages SSE) vs the direct path,
      PAIRED in the same run: gateway p50=2384ms, direct p50=2089ms, paired overhead
      median 248.7ms (N=10, point estimate; auth+reserve+ASGI, network excluded —
      transport=in-process-asgi). N is small: no distribution/significance claim.

  - id: perf-ttft-gateway-telemetry
    axis: perf
    capability: gateway-emitted-token-timing
    state: not-implemented
    measures: false
    issue: scenarios/GAPS.md#perf-token-timing
    note: >
      We measured gateway TTFT from the CLIENT. The gateway itself does not EMIT
      first-token / inter-token timing as telemetry (only ledger_transact_latency).
      Attributing overhead from the gateway's own metrics (not a client stopwatch)
      needs that hook — the concrete gap this run makes visible.

  - id: quality-exact-match
    axis: quality
    capability: exact-match-scorer
    state: covered
    measures: true
    evidence: {mode: live-gateway, date: "2026-07-22", region: us-east-1, n: 10, run_id: gw1}
    note: >
      A tiny, deterministic exact-match scorer (conservative, N stamped, no judge
      model, no similarity, norm-v1). Offline it scores a checked-in set (8/10);
      the GATEWAY-path response scores 10/10 (N=10) — same shared scorer. The
      offline/live gap (8 vs 10) is itself the lesson: the real model formatted
      "1024" without the comma the canned fixture assumed.

  - id: quality-eval-tap
    axis: quality
    capability: eval-tap
    state: not-implemented
    measures: false
    issue: scenarios/GAPS.md#quality-eval-tap
    note: >
      Feeding the scorer from a team's REAL request/response traffic needs an
      eval tap (prompt+response JSONL by span_id) the gateway does not emit yet.

  - id: quality-acceptance-bar
    axis: quality
    capability: quality-judgement
    state: user-responsibility
    measures: false
    note: >
      Deciding whether the routed traffic is good ENOUGH (the acceptance bar,
      the representative task set) is the operator's eval — Stratoclave provides
      the scoring fold, never the quality claim.
