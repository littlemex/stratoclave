# Machine-readable coverage for the small-team workshop scenario.
# Aggregated into scenarios/COVERAGE.md by backend/tests/test_scenarios_coverage.py.
# States: covered | covered-elsewhere | not-implemented | user-responsibility
# Rules enforced in CI: not-implemented needs an `issue:`; a step with
# measures:true must not be not-implemented / user-responsibility.
id: usage-small-team
title: A small team on one shared budget pool
audience: user

steps:
  - id: cost-savings
    axis: cost
    capability: savings-certificate
    state: covered
    measures: true
    note: >
      Real Savings Certificate engine folds the team's VSR-acted traffic into a
      counterfactual net saving (escalation subtracted, potential kept separate,
      quality.measured=false). Runs offline today.

  - id: cost-live-billing
    axis: cost
    capability: real-token-pricing
    state: covered
    measures: true
    evidence: {mode: live, date: "2026-07-22", region: us-east-1, n: 30, run_id: demo1}
    note: >
      live.py prices REAL Bedrock token usage (from message_delta, not estimated)
      with the shipped pricer. Verified live: $0.001686 over 30 calls. LIVE
      BASELINE — gateway not in path.

  - id: cost-per-user-attribution
    axis: cost
    capability: per-user-cost-split
    state: user-responsibility
    measures: false
    note: >
      Splitting the shared-pool spend per team member for chargeback is the
      operator's accounting choice; the ledger records span_id + tenant, the
      per-user rollup policy is theirs to define.

  - id: perf-ttft-client
    axis: perf
    capability: client-side-token-timing
    state: covered
    measures: true
    evidence: {mode: live, date: "2026-07-22", region: us-east-1, n: 30, run_id: demo1}
    note: >
      TTFT / TPOT ARE measurable client-side from the streaming response. Verified
      live against real Bedrock: TTFT p50=1074.5ms (N=30, raw kept). LIVE BASELINE,
      gateway not in path.

  - id: perf-ttft-gateway-telemetry
    axis: perf
    capability: gateway-token-timing
    state: not-implemented
    measures: false
    issue: scenarios/GAPS.md#perf-token-timing
    note: >
      The GATEWAY does not emit first-token / inter-token timing as telemetry
      (only ledger_transact_latency, the billing write). Diffing client-observed
      TTFT against a gateway-observed one — to attribute gateway overhead — needs
      that hook. This is the real gap the live baseline makes concrete.

  - id: quality-exact-match
    axis: quality
    capability: exact-match-scorer
    state: covered
    measures: true
    evidence: {mode: live, date: "2026-07-22", region: us-east-1, n: 10, run_id: demo1}
    note: >
      A tiny, deterministic exact-match scorer (conservative, N stamped, no judge
      model, no similarity, norm-v1). Offline it scores a checked-in set (8/10);
      live.py scores REAL haiku output (10/10, N=10) — same shared scorer. The
      offline/live gap (8 vs 10) is itself the lesson: the real model formatted
      "1024" without the comma the canned fixture assumed.

  - id: quality-eval-tap
    axis: quality
    capability: eval-tap
    state: not-implemented
    measures: false
    issue: scenarios/GAPS.md#quality-eval-tap
    note: >
      Feeding the scorer from a team's REAL request/response traffic needs an
      eval tap (prompt+response JSONL by span_id) the gateway does not emit yet.

  - id: quality-acceptance-bar
    axis: quality
    capability: quality-judgement
    state: user-responsibility
    measures: false
    note: >
      Deciding whether the routed traffic is good ENOUGH (the acceptance bar,
      the representative task set) is the operator's eval — Stratoclave provides
      the scoring fold, never the quality claim.
