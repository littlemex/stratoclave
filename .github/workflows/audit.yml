name: audit

# Supply-chain audit (A-04-ci, 2026-06 hardening sweep).
#
# Runs known-vulnerability scanners across every language ecosystem in
# the repo so a bumped dependency that ships a CVE breaks the merge
# rather than landing silently.
#
# Why these tools, with these flags:
#   - pip-audit  : reads requirements*.txt, reports against PyPI advisories.
#                  --strict makes any finding fail; ignore-vulns can be added
#                  case-by-case with a comment justifying the deferral.
#   - cargo-audit: reads Cargo.lock, reports against the RustSec advisory DB.
#                  --deny warnings turns advisories into a non-zero exit.
#   - npm audit  : reads package-lock.json. The default exit code is non-zero
#                  on any finding at moderate or higher; we keep that strict
#                  default and run on both `iac/` and `frontend/` lockfiles.
#
# Triage policy: a CVE finding blocks merge until either (a) bumped to a
# fixed version, or (b) explicitly deferred via the per-tool ignore
# mechanism with an inline reason and a tracking issue.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-run weekly so a new CVE against an already-pinned dep surfaces
    # without requiring a code change.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: backend / pip-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install --no-cache-dir pip-audit
      - name: Audit runtime dependencies
        run: pip-audit --strict -r requirements.txt
      - name: Audit dev dependencies
        run: pip-audit --strict -r requirements-dev.txt

  cargo-audit:
    name: cli / cargo-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # See cli/audit.toml for the inline justification of each
        # --ignore. Re-evaluate at every aws-sdk / aws-smithy bump;
        # the goal is to delete these flags entirely once the
        # AWS SDK chain drops the legacy-rustls path that pulls
        # rustls 0.21 / rustls-webpki 0.101.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104

  npm-audit-iac:
    name: iac / npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: iac/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit
        # `npm audit` exits non-zero on vulnerabilities at "moderate" or
        # higher; --audit-level=high keeps low-severity dev-only findings
        # out of the merge gate while still failing on anything serious.
        #
        # Deferral (npm has no native per-advisory --ignore, so we filter the
        # JSON and re-fail on anything NOT on the allowlist — same triage policy
        # as cli/audit.toml's cargo --ignore):
        #   GHSA-3jxr-9vmj-r5cp  brace-expansion DoS (high). The vulnerable
        #   5.0.6 is BUNDLED inside aws-cdk-lib (a bundledDependency under its
        #   own minimatch), so a root `overrides` pin cannot reach it and even
        #   the latest aws-cdk-lib (2.261.0) still ships 5.0.6. It is reachable
        #   only via minimatch on CDK-internal asset globs at SYNTH time (build
        #   tooling), never on attacker-controlled input at runtime. Re-evaluate
        #   at every aws-cdk-lib bump; delete this once CDK bundles >=5.0.7.
        run: |
          python3 - <<'PY'
          import json, subprocess, sys
          ALLOW = {"GHSA-3jxr-9vmj-r5cp"}  # bundled in aws-cdk-lib; synth-time only
          out = subprocess.run(
              ["npm", "audit", "--audit-level=high", "--json"],
              capture_output=True, text=True).stdout
          report = json.loads(out)
          blocking = []
          for name, v in report.get("vulnerabilities", {}).items():
              if v.get("severity") not in ("high", "critical"):
                  continue
              ids = {via.get("url", "").rsplit("/", 1)[-1]
                     for via in v.get("via", []) if isinstance(via, dict)}
              if ids - ALLOW:
                  blocking.append((name, v.get("severity"), sorted(ids)))
          if blocking:
              print("Blocking high/critical advisories (not on allowlist):")
              for n, sev, ids in blocking:
                  print(f"  {n} [{sev}] {ids}")
              sys.exit(1)
          print(f"npm audit: only allowlisted advisories present ({sorted(ALLOW)}); OK.")
          PY

  npm-audit-frontend:
    name: frontend / npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit
        run: npm audit --audit-level=high
