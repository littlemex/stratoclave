name: test

# Runs unit and integration tests for Backend (pytest), CLI (cargo test),
# and Frontend (vitest) on every pull request and push to main.
#
# Coverage (as of tests/full-coverage):
#   - Backend (65 tests + 1 xfail): credit reservation atomicity,
#     model allowlist, well-known discovery contract, JWT verification,
#     RBAC helpers, API key scope narrowing, tenant isolation, SSO gate,
#     bootstrap seed.
#   - CLI (42 tests): config.toml schema regression, mvp token
#     persistence (0600 permissions), setup URL validation.
#   - Frontend (23 tests): RBAC helpers, token storage, ProtectedRoute
#     integration.
#
# Follow-up PRs add MSW-backed UI tests, wiremock-based CLI contract
# tests, and Playwright E2E.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q tests/

  cli:
    name: cli / cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup set profile minimal
          rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Run cargo test
        run: cargo test --bin stratoclave -- --test-threads=1

  frontend:
    name: frontend / vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test
