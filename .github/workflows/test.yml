name: test

# Runs unit and integration tests for Backend (pytest), CLI (cargo test),
# and Frontend (vitest) on every pull request and push to main.
#
# Coverage:
#   - Backend (67 tests): credit reservation atomicity, model allowlist,
#     well-known discovery contract, JWT verification, RBAC helpers,
#     API key scope narrowing, tenant isolation, SSO gate, bootstrap
#     seed (including the scan_admins reserved-keyword regression).
#   - CLI (44 tests): config.toml schema regression, mvp token
#     persistence (0600 permissions), setup URL validation, wiremock-
#     driven `setup` integration against a stubbed backend.
#   - Frontend (31 tests): RBAC helpers, token storage, ProtectedRoute
#     integration, AuthContext bootstrap (3 paths), MeUsage rendering.
#
# Playwright smoke runs separately in .github/workflows/e2e-nightly.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend / pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install runtime + dev dependencies
        # requirements-dev.txt includes pytest, moto, joserfc, ruff etc.
        # The production Docker image installs requirements.txt only.
        run: pip install -r requirements-dev.txt
      - name: Run pytest
        run: pytest -q tests/

  cli:
    name: cli / cargo test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        run: |
          rustup set profile minimal
          rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
      - name: Run cargo test (unit + integration)
        run: cargo test -- --test-threads=1

  frontend:
    name: frontend / vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test
