name: secrets-scan

# Shape-based scan for hard-coded deployment identifiers (CloudFront
# distributions, Cognito pool IDs, ALB DNS, account IDs, live JWTs,
# AWS access keys). Runs on every push to main and every pull request
# targeting main. Fails the build if any hit is found so that docs,
# blog snippets, or code never leak live values by mistake.
#
# See scripts/check-no-hardcoded-secrets.sh for the pattern list and
# allowlist.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: check-no-hardcoded-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Scan the full tree, not a shallow clone, so committed diffs
          # are visible to `git grep`.
          fetch-depth: 0
      - name: Run secrets scan
        run: ./scripts/check-no-hardcoded-secrets.sh
